<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Scrollable horizontal Highcharts bar chart built with Vite and vanilla JavaScript."
    />
    <title>Scrollable Horizontal Bar Chart</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="page">
      <h1>Scrollable Bar Chart with Adjustable Margin and Features</h1>

      <div class="workspace" id="workspace">
        <section class="chart-panel">
          <div id="chart-container">
            <label class="dataset-select" for="datasetSelector">
              <span class="sr-only">Dataset</span>
              <select id="datasetSelector"></select>
            </label>

            <div class="slider-column">
              <input
                type="range"
                id="scrollbar"
                min="0"
                max="5"
                value="0"
                step="1"
                aria-label="Scroll visible bars"
              />
              <div id="sliderStatus" aria-live="polite"></div>
            </div>
            <div id="container" role="img" aria-label="Scrollable horizontal bar chart"></div>
          </div>

          <div class="chart-resize-row">
            <div
              class="chart-resize-handle"
              id="chartResizeHandle"
              role="separator"
              aria-label="Resize chart"
              aria-controls="container"
              aria-orientation="horizontal"
              aria-valuemin="300"
              aria-valuemax="720"
              aria-valuenow="400"
              tabindex="0"
              title="Drag to resize chart"
            ></div>
          </div>

          <section
            class="data-table-panel"
            id="dataTablePanel"
            aria-label="Visible chart data"
            hidden
          >
            <div class="data-table-wrapper">
              <table class="data-table">
                <thead>
                  <tr>
                    <th scope="col" aria-sort="none">
                      <button
                        type="button"
                        class="table-sort-button"
                        data-table-sort="name"
                      >
                        Category
                      </button>
                    </th>
                    <th scope="col" aria-sort="none">
                      <button
                        type="button"
                        class="table-sort-button"
                        data-table-sort="value"
                      >
                        Value
                      </button>
                    </th>
                  </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
              </table>
            </div>
          </section>
        </section>

        <aside
          class="controls-sidebar"
          id="controlsSidebar"
          aria-label="Chart controls"
        >
          <div
            class="sidebar-header"
            id="sidebarDragHandle"
            tabindex="0"
            aria-label="Drag controls panel"
            title="Drag controls panel"
          >
            <span
              class="sidebar-control-icon"
              role="img"
              aria-label="Drag controls"
              title="Drag controls"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M4 7h10" />
                <path d="M18 7h2" />
                <path d="M4 17h2" />
                <path d="M10 17h10" />
                <path d="M4 12h5" />
                <path d="M13 12h7" />
                <circle cx="16" cy="7" r="2" />
                <circle cx="8" cy="17" r="2" />
                <circle cx="11" cy="12" r="2" />
              </svg>
            </span>
            <button
              type="button"
              class="sidebar-toggle"
              id="sidebarToggle"
              aria-expanded="true"
              aria-controls="controlsContent"
              aria-label="Collapse controls"
              title="Collapse controls"
            >
              <span
                class="sidebar-toggle-icon"
                id="sidebarToggleIcon"
                aria-hidden="true"
              >
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="m15 6-6 6 6 6" />
                </svg>
              </span>
              <span class="sr-only" id="sidebarToggleText">Collapse controls</span>
            </button>
          </div>

          <div class="controls-content" id="controlsContent">
          <div class="controls-tabs" role="tablist" aria-label="Control sections">
            <button
              type="button"
              class="controls-tab is-active"
              id="tab-display"
              role="tab"
              aria-selected="true"
              aria-controls="panel-display"
              data-tab-target="display"
            >
              Display
            </button>
            <button
              type="button"
              class="controls-tab"
              id="tab-analysis"
              role="tab"
              aria-selected="false"
              aria-controls="panel-analysis"
              data-tab-target="analysis"
              tabindex="-1"
            >
              Analysis
            </button>
            <button
              type="button"
              class="controls-tab"
              id="tab-axis"
              role="tab"
              aria-selected="false"
              aria-controls="panel-axis"
              data-tab-target="axis"
              tabindex="-1"
            >
              Axis
            </button>
            <button
              type="button"
              class="controls-tab"
              id="tab-format"
              role="tab"
              aria-selected="false"
              aria-controls="panel-format"
              data-tab-target="format"
              tabindex="-1"
            >
              Format
            </button>
          </div>

          <div
            class="analysis-controls control-section"
            id="panel-analysis"
            role="tabpanel"
            aria-labelledby="tab-analysis"
            data-tab-panel="analysis"
            hidden
          >
            <section class="filter-controls" aria-label="Analysis filters">
              <div class="analysis-breakdown-controls">
                <label for="groupBySelector">
                  <span>Group By:</span>
                  <select id="groupBySelector">
                    <option value="none" selected>&lt;None&gt;</option>
                    <option value="projectHealth">Project Health</option>
                    <option value="country">Country</option>
                    <option value="lineOfBusiness">Line of Business</option>
                  </select>
                </label>

                <label class="checkbox-label" for="expandUnassignedCheckbox">
                  <input type="checkbox" id="expandUnassignedCheckbox" checked />
                  <span>Expand Unassigned</span>
                </label>

                <label for="colorBySelector">
                  <span>Color By:</span>
                  <select id="colorBySelector">
                    <option value="none" selected>&lt;None&gt;</option>
                    <option value="colorTag">Color Tag</option>
                    <option value="projectHealth">Project Health</option>
                    <option value="country">Country</option>
                    <option value="lineOfBusiness">Line of Business</option>
                  </select>
                </label>
              </div>

              <section class="filter-builder" aria-labelledby="barFiltersHeading">
                <h2 class="filter-builder-heading" id="barFiltersHeading">Filters</h2>
                <div class="filter-builder-content">
                  <section class="filter-card" aria-labelledby="barFilterOneHeading">
                    <h2 id="barFilterOneHeading">Filter 1</h2>
                    <label class="sr-only" for="barFilterOneSelector">Filter 1 field</label>
                    <select id="barFilterOneSelector" class="filter-field-select">
                      <option value="none" selected>&lt;None&gt;</option>
                      <option value="value">Value</option>
                    </select>
                  </section>

                  <section class="filter-card" aria-labelledby="barFilterTwoHeading">
                    <h2 id="barFilterTwoHeading">Filter 2</h2>
                    <label class="sr-only" for="barFilterTwoSelector">Filter 2 field</label>
                    <select id="barFilterTwoSelector" class="filter-field-select">
                      <option value="none" selected>&lt;None&gt;</option>
                      <option value="value">Value</option>
                    </select>
                  </section>

                  <div class="filter-action-row">
                    <button type="button" class="filter-action-button filter-add-button">
                      <span>Add</span>
                      <span aria-hidden="true">+</span>
                    </button>
                  </div>
                </div>
              </section>

              <div class="analysis-action-row">
                <button type="button" class="analysis-action-button analysis-apply-button">
                  Apply
                </button>
                <button
                  type="button"
                  class="analysis-action-button analysis-reset-button"
                  id="resetAnalysisButton"
                >
                  Reset
                </button>
              </div>
            </section>
          </div>

          <div
            class="control-panel control-section is-active"
            id="panel-display"
            role="tabpanel"
            aria-labelledby="tab-display"
            data-tab-panel="display"
          >
            <label for="windowSizeSelector">Bars per page:</label>
            <select id="windowSizeSelector">
              <option value="3">3</option>
              <option value="5" selected>5</option>
              <option value="8">8</option>
              <option value="12">12</option>
              <option value="20">20</option>
              <option value="max">Max</option>
            </select>

            <label class="checkbox-label" for="toggleLabels">
              <input type="checkbox" id="toggleLabels" checked />
              <span>Show values in bars</span>
            </label>

            <label class="checkbox-label" for="showDataTableCheckbox">
              <input type="checkbox" id="showDataTableCheckbox" checked />
              <span>Show data table</span>
            </label>

            <label for="orientationSelector">
              <span>Orientation:</span>
              <select id="orientationSelector">
                <option value="horizontal" selected>Horizontal</option>
                <option value="vertical">Vertical</option>
              </select>
            </label>

            <label for="sortSelector">
              <span>Sort:</span>
              <select id="sortSelector">
                <option value="unsorted">Unsorted</option>
                <option value="valueAsc">Value ↑</option>
                <option value="valueDesc" selected>Value ↓</option>
                <option value="nameAsc">Name A-Z</option>
                <option value="nameDesc">Name Z-A</option>
              </select>
            </label>

            <details class="advanced-controls" id="advancedDisplayControls">
              <summary>Advanced</summary>

              <div class="advanced-controls-content">
                <label class="range-label" for="leftMarginSlider">
                  <span>Left Margin:</span>
                  <input
                    type="range"
                    id="leftMarginSlider"
                    min="0"
                    max="200"
                    value="100"
                    step="10"
                  />
                  <span><span id="leftMarginValue">100</span>px</span>
                </label>

                <label class="range-label" for="barHeightSlider">
                  <span>Bar Height:</span>
                  <input
                    type="range"
                    id="barHeightSlider"
                    min="0.5"
                    max="1.0"
                    step="0.025"
                    value="0.75"
                  />
                  <span id="barHeightValue">0.75</span>
                </label>

                <label class="range-label" for="chartHeightSlider">
                  <span>Chart Height:</span>
                  <input
                    type="range"
                    id="chartHeightSlider"
                    min="300"
                    max="720"
                    step="20"
                    value="400"
                  />
                  <span><span id="chartHeightValue">400</span>px</span>
                </label>
              </div>
            </details>

            <button type="button" id="resetDefaultsButton">
              Reset to defaults
            </button>
          </div>

          <div
            class="secondary-controls control-section"
            id="panel-axis"
            role="tabpanel"
            aria-labelledby="tab-axis"
            data-tab-panel="axis"
            hidden
          >
            <label class="checkbox-label" for="autoScaleCheckbox">
              <input type="checkbox" id="autoScaleCheckbox" checked />
              <span>Auto-scale Axis</span>
            </label>

            <label for="yMinInput">
              <span>Axis Min:</span>
              <span class="axis-bound-control">
                <input type="number" id="yMinInput" value="0" step="10" />
                <output
                  class="axis-bound-value"
                  id="yMinFormattedValue"
                  for="yMinInput"
                ></output>
              </span>
            </label>

            <label for="yMaxInput">
              <span>Axis Max:</span>
              <span class="axis-bound-control">
                <input type="number" id="yMaxInput" value="100" step="10" />
                <output
                  class="axis-bound-value"
                  id="yMaxFormattedValue"
                  for="yMaxInput"
                ></output>
              </span>
            </label>
          </div>

          <div
            class="tertiary-controls control-section"
            id="panel-format"
            role="tabpanel"
            aria-labelledby="tab-format"
            data-tab-panel="format"
            hidden
          >
            <label for="xAxisLocaleInput">
              <span>Value Axis Locale:</span>
              <input
                type="text"
                id="xAxisLocaleInput"
                value="en-US"
                placeholder="Browser default"
              />
            </label>

            <label for="xAxisNotationSelect">
              <span>Notation:</span>
              <select id="xAxisNotationSelect">
                <option value="standard">Standard</option>
                <option value="compact" selected>Compact</option>
                <option value="scientific">Scientific</option>
                <option value="engineering">Engineering</option>
              </select>
            </label>

            <label for="xAxisStyleSelect">
              <span>Style:</span>
              <select id="xAxisStyleSelect">
                <option value="decimal">Decimal</option>
                <option value="currency" selected>Currency</option>
              </select>
            </label>

            <label for="xAxisCurrencyInput">
              <span>Currency:</span>
              <input
                type="text"
                id="xAxisCurrencyInput"
                value="USD"
                maxlength="3"
                placeholder="USD"
              />
              <span
                id="xAxisCurrencyStatus"
                class="field-status"
                aria-live="polite"
              ></span>
            </label>

            <label for="xAxisFractionDigitsInput">
              <span>Max Fraction Digits:</span>
              <input
                type="number"
                id="xAxisFractionDigitsInput"
                min="0"
                max="6"
                value="0"
              />
            </label>

            <label class="checkbox-label" for="xAxisGroupingCheckbox">
              <input type="checkbox" id="xAxisGroupingCheckbox" checked />
              <span>Use Grouping</span>
            </label>
          </div>
          </div>
        </aside>
      </div>
    </main>

    <style id="dynamic-slider-style"></style>
  </body>
</html>
