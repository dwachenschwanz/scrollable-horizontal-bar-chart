<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Scrollable horizontal Highcharts bar chart built with Vite and vanilla JavaScript."
    />
    <title>Scrollable Horizontal Bar Chart</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="page">
      <h1>Scrollable Bar Chart with Adjustable Margin and Features</h1>

      <div class="workspace">
        <section class="chart-panel">
          <div id="chart-container">
            <label class="dataset-select" for="datasetSelector">
              <span class="sr-only">Dataset</span>
              <select id="datasetSelector">
                <option value="dataset1">NPV ($M)</option>
                <option value="dataset2">Gross Margin ($M)</option>
                <option value="dataset3">A very large kjasd; Dataset 3</option>
              </select>
            </label>

            <div class="slider-column">
              <input
                type="range"
                id="scrollbar"
                min="0"
                max="5"
                value="0"
                step="1"
                aria-label="Scroll visible bars"
              />
              <div id="sliderStatus" aria-live="polite"></div>
            </div>
            <div id="container" role="img" aria-label="Scrollable horizontal bar chart"></div>
          </div>

          <section
            class="data-table-panel"
            id="dataTablePanel"
            aria-label="Visible chart data"
            hidden
          >
            <div class="data-table-header">Visible data</div>
            <div class="data-table-wrapper">
              <table class="data-table">
                <thead>
                  <tr>
                    <th scope="col">Category</th>
                    <th scope="col">Value</th>
                  </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
              </table>
            </div>
          </section>
        </section>

        <aside class="controls-sidebar" aria-label="Chart controls">
          <div class="controls-tabs" role="tablist" aria-label="Control sections">
            <button
              type="button"
              class="controls-tab is-active"
              id="tab-display"
              role="tab"
              aria-selected="true"
              aria-controls="panel-display"
              data-tab-target="display"
            >
              Display
            </button>
            <button
              type="button"
              class="controls-tab"
              id="tab-axis"
              role="tab"
              aria-selected="false"
              aria-controls="panel-axis"
              data-tab-target="axis"
              tabindex="-1"
            >
              Axis
            </button>
            <button
              type="button"
              class="controls-tab"
              id="tab-format"
              role="tab"
              aria-selected="false"
              aria-controls="panel-format"
              data-tab-target="format"
              tabindex="-1"
            >
              Format
            </button>
          </div>

          <div
            class="control-panel control-section is-active"
            id="panel-display"
            role="tabpanel"
            aria-labelledby="tab-display"
            data-tab-panel="display"
          >
            <label for="windowSizeSelector">Bars per page:</label>
            <select id="windowSizeSelector">
              <option value="3">3</option>
              <option value="5" selected>5</option>
              <option value="8">8</option>
              <option value="12">12</option>
              <option value="20">20</option>
              <option value="max">Max</option>
            </select>

            <label class="checkbox-label" for="toggleLabels">
              <input type="checkbox" id="toggleLabels" checked />
              <span>Show values in bars</span>
            </label>

            <label class="checkbox-label" for="showDataTableCheckbox">
              <input type="checkbox" id="showDataTableCheckbox" />
              <span>Show data table</span>
            </label>

            <label for="orientationSelector">
              <span>Orientation:</span>
              <select id="orientationSelector">
                <option value="horizontal" selected>Horizontal</option>
                <option value="vertical">Vertical</option>
              </select>
            </label>

            <label class="range-label" for="leftMarginSlider">
              <span>Left Margin:</span>
              <input
                type="range"
                id="leftMarginSlider"
                min="0"
                max="200"
                value="100"
                step="10"
              />
              <span><span id="leftMarginValue">100</span>px</span>
            </label>

            <label class="range-label" for="barHeightSlider">
              <span>Bar Height:</span>
              <input
                type="range"
                id="barHeightSlider"
                min="0.5"
                max="1.0"
                step="0.025"
                value="0.75"
              />
              <span id="barHeightValue">0.75</span>
            </label>

            <label for="sortSelector">
              <span>Sort:</span>
              <select id="sortSelector">
                <option value="unsorted">Unsorted</option>
                <option value="valueAsc">Value ↑</option>
                <option value="valueDesc" selected>Value ↓</option>
                <option value="nameAsc">Name A-Z</option>
                <option value="nameDesc">Name Z-A</option>
              </select>
            </label>
          </div>

          <div
            class="secondary-controls control-section"
            id="panel-axis"
            role="tabpanel"
            aria-labelledby="tab-axis"
            data-tab-panel="axis"
            hidden
          >
            <label class="checkbox-label" for="autoScaleCheckbox">
              <input type="checkbox" id="autoScaleCheckbox" checked />
              <span>Auto-scale Axis</span>
            </label>

            <label for="yMinInput">
              <span>Axis Min:</span>
              <input type="number" id="yMinInput" value="0" step="10" />
            </label>

            <label for="yMaxInput">
              <span>Axis Max:</span>
              <input type="number" id="yMaxInput" value="100" step="10" />
            </label>
          </div>

          <div
            class="tertiary-controls control-section"
            id="panel-format"
            role="tabpanel"
            aria-labelledby="tab-format"
            data-tab-panel="format"
            hidden
          >
            <label for="xAxisLocaleInput">
              <span>Value Axis Locale:</span>
              <input
                type="text"
                id="xAxisLocaleInput"
                value="en-US"
                placeholder="Browser default"
              />
            </label>

            <label for="xAxisNotationSelect">
              <span>Notation:</span>
              <select id="xAxisNotationSelect">
                <option value="standard" selected>Standard</option>
                <option value="compact">Compact</option>
                <option value="scientific">Scientific</option>
                <option value="engineering">Engineering</option>
              </select>
            </label>

            <label for="xAxisStyleSelect">
              <span>Style:</span>
              <select id="xAxisStyleSelect">
                <option value="decimal" selected>Decimal</option>
                <option value="currency">Currency</option>
              </select>
            </label>

            <label for="xAxisCurrencyInput">
              <span>Currency:</span>
              <input
                type="text"
                id="xAxisCurrencyInput"
                value="USD"
                maxlength="3"
                placeholder="USD"
              />
            </label>

            <label for="xAxisFractionDigitsInput">
              <span>Max Fraction Digits:</span>
              <input
                type="number"
                id="xAxisFractionDigitsInput"
                min="0"
                max="6"
                value="0"
              />
            </label>

            <label class="checkbox-label" for="xAxisGroupingCheckbox">
              <input type="checkbox" id="xAxisGroupingCheckbox" checked />
              <span>Use Grouping</span>
            </label>
          </div>
        </aside>
      </div>
    </main>

    <style id="dynamic-slider-style"></style>
  </body>
</html>
